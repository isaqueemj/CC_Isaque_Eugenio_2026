<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Endereços | ERP Front-end</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet"
    />
    <link href="../css/style.css" rel="stylesheet" />
    <link href="../css/dashboard.css" rel="stylesheet" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <div class="brand">
          <i class="fa-solid fa-layer-group"></i><span>Cidade-Estado-Pais</span>
        </div>
        <nav>
          <a class="nav-link" href="../dashboard.html"
            ><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a
          >
          <a class="nav-link" href="paises.html"
            ><i class="fa-solid fa-globe"></i><span>Países</span></a
          >
          <a class="nav-link" href="estados.html"
            ><i class="fa-solid fa-map"></i><span>Estados</span></a
          >
          <a class="nav-link" href="cidades.html"
            ><i class="fa-solid fa-city"></i><span>Cidades</span></a
          >
          <a class="nav-link active" href="enderecos.html"
            ><i class="fa-solid fa-location-dot"></i><span>Endereços</span></a
          >
          <a class="nav-link" href="informacoes.html"
            ><i class="fa-solid fa-circle-info"></i><span>Informações</span></a
          >
          <a class="nav-link" href="clientes.html"
            ><i class="fa-solid fa-users"></i><span>Clientes</span></a
          >
          <a class="nav-link" href="fornecedores.html"
            ><i class="fa-solid fa-truck-field"></i><span>Fornecedores</span></a
          >
          <a class="nav-link" href="produtos.html"
            ><i class="fa-solid fa-box"></i><span>Produtos</span></a
          >
          <a class="nav-link" href="modelos.html"
            ><i class="fa-solid fa-tags"></i><span>Modelos</span></a
          >
          <a class="nav-link" href="veiculos.html"
            ><i class="fa-solid fa-car"></i><span>Veículos</span></a
          >
          <a class="nav-link" href="transportadores.html"
            ><i class="fa-solid fa-truck-fast"></i
            ><span>Transportadores</span></a
          >
        </nav>
      </aside>
      <div class="main-wrapper">
        <header class="topbar">
          <button
            id="toggleSidebar"
            class="btn btn-light btn-sm"
            data-bs-toggle="tooltip"
            title="Recolher menu"
          >
            <i class="fa-solid fa-bars"></i>
          </button>
          <div>
            <h1>Endereços</h1>
            <small
              >Interface administrativa local.</small
            >
          </div>
        </header>
        <main class="content">
          <div class="card erp-card fade-in">
            <div
              class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2"
            >
              <span><i id="entityIcon"></i> <span id="entityTitle"></span></span
              ><button id="btnNovo" class="btn btn-primary">
                <i class="fa-solid fa-plus me-1"></i>Novo
              </button>
            </div>
            <div class="card-body">
              <div class="toolbar">
                <div class="search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i
                  ><input
                    id="instantSearch"
                    class="form-control"
                    placeholder="Busca instantânea..."
                  />
                </div>
                <span id="loadingSearch" class="loading-inline"
                  ><i class="fa-solid fa-spinner fa-spin"></i>
                  pesquisando...</span
                >
              </div>
              <div class="table-responsive">
                <table
                  id="mainTable"
                  class="table table-striped table-hover w-100 align-middle"
                ></table>
              </div>
            </div>
          </div>
          <div class="modal fade" id="crudModal" tabindex="-1">
            <div class="modal-dialog modal-lg modal-dialog-scrollable">
              <div class="modal-content">
                <form id="crudForm">
                  <div class="modal-header">
                    <h5 id="modalTitle" class="modal-title"></h5>
                    <button
                      type="button"
                      class="btn-close"
                      data-bs-dismiss="modal"
                    ></button>
                  </div>
                  <div class="modal-body">
                    <input type="hidden" id="recordId" />
                    <div id="formFields" class="row g-3"></div>
                  </div>
                  <div class="modal-footer">
                    <button
                      type="button"
                      class="btn btn-light"
                      data-bs-dismiss="modal"
                    >
                      Cancelar</button
                    ><button class="btn btn-primary" type="submit">
                      <i class="fa-solid fa-floppy-disk me-1"></i>Salvar
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </main>
        <footer class="footer">
          © 2026 ERP Front-end • Bootstrap 5, DataTables, Chart.js e JavaScript
          puro
        </footer>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/enderecos.js"></script>
  </body>
</html>
